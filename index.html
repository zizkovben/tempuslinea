<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempus Linea — The Civilization Timeline | 1,000 Civilizations</title>
  <meta name="description" content="Tempus Linea — the definitive interactive archive of 1,000 human civilizations. Explore confirmed history and alternative theories from the Big Bang to the present. Debate Atlantis, Ancient Egypt, Göbekli Tepe and more.">
  <meta name="keywords" content="civilization timeline, ancient history, Atlantis, Graham Hancock, Göbekli Tepe, ancient Egypt, interactive history, alternative history, archaeology">
  <meta name="author" content="Tempus Linea">
  <meta property="og:title" content="Tempus Linea — The Civilization Timeline">
  <meta property="og:description" content="The definitive interactive archive of 1,000 human civilizations — from confirmed archaeology to the most fiercely debated alternative theories.">
  <meta property="og:url" content="https://tempuslinea.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tempus Linea — The Civilization Timeline">
  <meta name="twitter:description" content="1,000 civilizations. Zoom from the Big Bang to the present. Debate Atlantis, ancient Egypt, Göbekli Tepe and more.">
  <link rel="canonical" href="https://tempuslinea.com/index.html">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── EPOCH COLOURS in CSS for smooth day/night transition ── */
    #timeline-canvas { transition: filter 0.3s ease; }
    [data-theme="day"] #timeline-canvas { filter: brightness(1.05) contrast(0.95); }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ══ HEADER ═══════════════════════════════════════════ -->
  <header class="app-header">
    <div>
      <div class="logo-title">TEMPUS LINEA</div>
      <div class="logo-sub">THE CIVILIZATION TIMELINE · INTERACTIVE ARCHIVE</div>
    </div>

    <!-- Search + theme toggle -->
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <input id="search-box" type="text" placeholder="Search civilizations..."
        style="background:rgba(10,18,40,.8);border:1px solid rgba(12,35,80,.6);
               color:var(--text-primary);font-family:var(--font-ui);font-size:11px;
               letter-spacing:1px;padding:5px 12px;border-radius:3px;width:200px;
               outline:none;transition:border-color .2s;">
      <span id="search-hint" style="font-size:9px;color:var(--text-dim);letter-spacing:1px;"></span>
    </div>
  </header>

  <!-- ══ NAVIGATION ════════════════════════════════════════ -->
  <nav class="app-nav">
    <a href="index.html" class="active">TIMELINE</a>
    <span class="nav-sep">·</span>
    <a href="globe.html">LIVING ATLAS</a>
    <span class="nav-sep">·</span>
    <a href="community.html">COMMUNITY</a>
    <span class="nav-sep">·</span>
    <a href="portal.html">MY PORTAL</a>
    <span class="nav-sep">·</span>
    <a href="about.html">ABOUT</a>
  </nav>

  <!-- ══ PRESET ZOOM TOOLBAR ═══════════════════════════════ -->
  <div class="toolbar">
    <span class="section-label">ZOOM :</span>
    <div id="preset-btns" style="display:flex;gap:4px;flex-wrap:wrap;"></div>

    <div class="toolbar-sep"></div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#8B5E0A;border:1px solid #E8A020;"></div>
        <span style="color:var(--gold-text);">CONFIRMED</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1E3A7A;border:1px solid #4A7FD4;"></div>
        <span style="color:var(--violet-text);">THEORIZED</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#0A5A55;border:1px solid #2AADA0;"></div>
        <span style="color:var(--teal-text);">DEBATED</span>
      </div>
    </div>

    <div class="toolbar-sep"></div>
    <button id="filter-toggle" class="btn">⚙ FILTERS<span id="filter-badge"></span></button>
    <div class="status-bar">SCROLL TO ZOOM · DRAG TO PAN · TAP TO EXPLORE</div>
  </div>

  <!-- ══ FILTER PANEL (collapsible) ════════════════════════ -->
  <div id="filter-panel" style="display:none;"></div>

  <!-- ══ ACTIVE FILTER CHIPS ═══════════════════════════════ -->
  <div id="filter-chips"
    style="display:none;align-items:center;gap:6px;flex-wrap:wrap;
           padding:6px 20px;border-bottom:1px solid rgba(12,35,80,.4);
           background:rgba(5,10,22,.9);">
  </div>

  <!-- ══ TIMELINE CANVAS ═══════════════════════════════════ -->
  <div id="timeline-wrap" style="position:relative;overflow:hidden;touch-action:none;flex:1;">
    <canvas id="timeline-canvas" style="display:block;cursor:grab;"></canvas>
  </div>

  <!-- ══ CIVILIZATION DETAIL PANEL ═════════════════════════ -->
  <div id="info-panel-backdrop" class="info-panel-backdrop" onclick="ChronosUI.hideInfo()"></div>
  <div id="info-panel" class="info-panel">
    <div id="info-inner" class="info-inner"></div>
  </div>

  <!-- ══ FOOTER ════════════════════════════════════════════ -->
  <footer style="padding:10px 20px;border-top:1px solid var(--border-dim);
                 display:flex;justify-content:space-between;align-items:center;
                 flex-wrap:wrap;gap:8px;background:var(--bg-panel);">
    <span style="font-size:9px;color:var(--text-dim);letter-spacing:1px;">
      TEMPUS LINEA · TIMELINE ENGINE
    </span>
    <span style="font-size:9px;color:var(--text-dim);letter-spacing:1px;">
      1,000 CIVILIZATIONS · CONTRIBUTE IN COMMUNITY
    </span>
    <span style="font-size:9px;color:var(--text-dim);letter-spacing:1px;">
      tempuslinea.com
    </span>
  </footer>

</div><!-- /app-shell -->

<script src="data-extended.js"></script>

<script src="celestial-data-indigenous.js"></script>
<script src="celestial.js"></script>
<script src="share.js"></script>
<script src="share-ui-styles.js"></script>
<script src="share-ui.js"></script>
<script src="notifications.js"></script>
<script src="notifications-ui.js"></script>
<script src="clio-prompt.js"></script>
<script src="clio-ui.js"></script>
<script src="clio.js"></script>

</body>
</html>
